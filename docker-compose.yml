services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - downloads:/downloads
      - lumina_data:/app/data
    depends_on:
      - aria2
      - jackett
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

  aria2:
    image: p3terx/aria2-pro
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK_SET=022
      - RPC_SECRET=${ARIA2_RPC_SECRET:-lumina}
      - RPC_PORT=6800
      - LISTEN_PORT=6888
      - DISK_CACHE=64M
    volumes:
      - downloads:/downloads
      - aria2_config:/config
    ports:
      - "6800:6800"
      - "6888:6888"
      - "6888:6888/udp"
    restart: unless-stopped

  jackett:
    image: linuxserver/jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
    volumes:
      - jackett_config:/config
    ports:
      - "9117:9117"
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Prague
      - WEBUI_PORT=8080
    volumes:
      - downloads:/downloads
      - qbittorrent_config:/config
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

volumes:
  downloads:
  lumina_data:
  aria2_config:
  jackett_config:
  qbittorrent_config:
